<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymPlanner - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">💪 GymPlanner</div>
            
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h1>Welcome Back!</h1>
                <p class="subtitle">Sign in to continue your fitness journey</p>
                
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    
                    <div class="error-message" id="loginError"></div>
                    
                    <button type="submit" class="btn-primary">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader" style="display: none;">⏳</span>
                    </button>
                </form>
                
                <p class="switch-text">
                    Don't have an account? 
                    <a href="#" id="showSignup">Sign up</a>
                </p>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <h1>Join GymPlanner</h1>
                <p class="subtitle">Start tracking your fitness today</p>
                
                <form id="signupFormElement">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" required placeholder="John Doe">
                    </div>
                    
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" required placeholder="••••••••" minlength="6">
                        <small>Minimum 6 characters</small>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signupHeight">Height (cm)</label>
                            <input type="number" id="signupHeight" required placeholder="170" min="100" max="250">
                        </div>
                        <div class="form-group">
                            <label for="signupAge">Age</label>
                            <input type="number" id="signupAge" required placeholder="25" min="13" max="100">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="signupGender">Gender</label>
                        <select id="signupGender" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="error-message" id="signupError"></div>
                    
                    <button type="submit" class="btn-primary">
                        <span class="btn-text">Create Account</span>
                        <span class="btn-loader" style="display: none;">⏳</span>
                    </button>
                </form>
                
                <p class="switch-text">
                    Already have an account? 
                    <a href="#" id="showLogin">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
