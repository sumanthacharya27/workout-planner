<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Gym Workout Planner</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>🔥 Gym Workout Planner</h1>
    <div>
      <span id="welcomeName"></span>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </div>
  </header>

  <nav class="nav-grid">
    <button class="nav-btn active" data-view="dashboard">📊 Dashboard</button>
    <button class="nav-btn" data-view="workouts">💪 Workouts</button>
    <button class="nav-btn" data-view="builder">🧱 Build</button>
    <button class="nav-btn" data-view="history">📅 History</button>
    <button class="nav-btn" data-view="progress">🏆 Progress</button>
  </nav>

  <main>
    <section id="dashboard" class="view">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="panel">
        <h3>Recent 5 Workouts</h3>
        <ul id="recentList"></ul>
      </div>
    </section>

    <section id="workouts" class="view hidden">
      <div class="row">
        <h2>Pre-made Workouts</h2>
        <select id="difficultyFilter">
          <option value="all">All</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>
      <div id="premadeGrid" class="card-grid"></div>
      <h2>Your Custom Workouts</h2>
      <div id="customGrid" class="card-grid"></div>
    </section>

    <section id="builder" class="view hidden">
      <div class="panel">
        <h2>Create Custom Workout</h2>
        <div class="grid-two">
          <input id="workoutName" placeholder="Workout Name" />
          <select id="workoutDifficulty">
            <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
          </select>
        </div>
        <textarea id="workoutDescription" placeholder="Description"></textarea>
        <button id="openExerciseModal" class="btn">+ Add Exercise</button>
        <div id="exerciseList"></div>
        <button id="saveWorkoutBtn" class="btn">Save Workout</button>
      </div>
    </section>

    <section id="history" class="view hidden">
      <div class="row">
        <h2>Workout History</h2>
        <select id="historyFilter">
          <option value="all">All</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
        </select>
      </div>
      <div id="historyList"></div>
    </section>

    <section id="progress" class="view hidden">
      <div class="chart-grid">
        <div class="panel"><canvas id="weeklyChart"></canvas></div>
        <div class="panel"><canvas id="distributionChart"></canvas></div>
      </div>
      <div id="achievements" class="card-grid"></div>
    </section>

    <section id="execution" class="view hidden">
      <div class="panel">
        <h2 id="execTitle"></h2>
        <div class="progress-wrap"><div id="execProgress"></div></div>
        <p id="execCounter"></p>
        <div id="execExercise"></div>
        <div class="row">
          <button id="prevExercise" class="btn btn-outline">Prev</button>
          <button id="nextExercise" class="btn">Next</button>
          <button id="finishWorkout" class="btn hidden">Finish Workout</button>
        </div>
      </div>
    </section>
  </main>

  <div id="exerciseModal" class="modal hidden">
    <div class="modal-card">
      <h3>Add Exercise</h3>
      <input id="exName" placeholder="Exercise name" />
      <div class="grid-three">
        <input id="exSets" type="number" value="3" min="1" placeholder="Sets" />
        <input id="exReps" type="number" value="10" min="1" placeholder="Reps" />
        <input id="exWeight" type="number" value="0" min="0" placeholder="Weight" />
      </div>
      <input id="exRest" type="number" value="60" min="0" placeholder="Rest seconds" />
      <div class="row">
        <button id="cancelExercise" class="btn btn-outline">Cancel</button>
        <button id="addExerciseBtn" class="btn">Add</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
