<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GymPlanner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">💪 GymPlanner</div>
            <div class="nav-user">
                <span id="userName">Loading...</span>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Dashboard Stats -->
        <section class="stats-section">
            <h1>Dashboard</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-number" id="totalWorkouts">0</div>
                    <div class="stat-label">Total Workouts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-number" id="currentStreak">0</div>
                    <div class="stat-label">Day Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-number" id="totalTime">0</div>
                    <div class="stat-label">Hours Trained</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💪</div>
                    <div class="stat-number" id="totalExercises">0</div>
                    <div class="stat-label">Exercises Done</div>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="actions-section">
            <h2>Quick Actions</h2>
            <div class="action-buttons">
                <button class="action-btn primary" onclick="window.location.href='workouts.html'">
                    <span class="btn-icon">📋</span>
                    <span>Browse Workouts</span>
                </button>
                <button class="action-btn secondary" onclick="window.location.href='workouts.html'">
                    <span class="btn-icon">➕</span>
                    <span>Create Workout</span>
                </button>
                <button class="action-btn tertiary" onclick="window.location.href='progress.html'">
                    <span class="btn-icon">📊</span>
                    <span>View Progress</span>
                </button>
            </div>
        </section>

        <!-- Recent Workouts -->
        <section class="recent-section">
            <h2>Recent Workouts</h2>
            <div id="recentWorkouts" class="recent-list">
                <p class="empty-state">No workouts yet. Start your first workout!</p>
            </div>
        </section>

    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/progress.js"></script>
    <script>
        // Check authentication and load user data
        (async function() {
            
            // Check if logged in
            const isLoggedIn = await checkAuth();
            if (!isLoggedIn) {
                window.location.href = 'index.html';
                return;
            }
            
            // Get user session data
            try {
                const response = await fetch(ENDPOINTS.CHECK_SESSION);
                const sessionData = await response.json();
                
                if (sessionData.success && sessionData.data) {
                    const userNameElement = document.getElementById('userName');
                    if (userNameElement) {
                        userNameElement.textContent = sessionData.data.full_name;
                    }
                }
            } catch (error) {
                console.error('Error loading user:', error);
            }
            
            // Load stats
            loadDashboardStats();
            
        })();
        
        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch(ENDPOINTS.LOGOUT, { method: 'POST' });
            window.location.href = 'index.html';
        });

        async function loadDashboardStats() {
            try {
                const result = await getUserStats();
                
                if (result.success && result.data) {
                    const stats = result.data;
                    
                    document.getElementById('totalWorkouts').textContent = stats.total_workouts || '0';
                    document.getElementById('currentStreak').textContent = stats.current_streak || '0';
                    document.getElementById('totalTime').textContent = Math.floor((stats.total_time || 0) / 60);
                    document.getElementById('totalExercises').textContent = stats.total_exercises || '0';
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
    </script>
</body>
</html>
