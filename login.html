<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GymPlanner</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-section">
                <div class="logo">💪</div>
                <h1>GymPlanner</h1>
                <p>Track your fitness journey</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <h2>Welcome Back</h2>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>

                <button class="btn-primary" id="loginBtn">Login</button>

                <p class="switch-form">
                    Don't have an account? 
                    <a href="#" onclick="showRegister()">Sign up</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form" style="display: none;">
                <h2>Create Account</h2>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="registerName" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="At least 6 characters" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Height (cm)</label>
                        <input type="number" id="registerHeight" placeholder="175">
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="registerAge" placeholder="25">
                    </div>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select id="registerGender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <button class="btn-primary" id="registerBtn">Create Account</button>

                <p class="switch-form">
                    Already have an account? 
                    <a href="#" onclick="showLogin()">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
