<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Gym Workout Planner | Login</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <h1>🏋️ Gym Workout Planner</h1>
      <p>Build strength with structure and consistency.</p>

      <div class="tabs">
        <button id="loginTab" class="tab active">Login</button>
        <button id="registerTab" class="tab">Register</button>
      </div>

      <form id="authForm" class="auth-form">
        <div id="registerExtras" class="hidden">
          <input type="text" name="name" placeholder="Name" />
          <input type="number" name="age" placeholder="Age" />
          <input type="number" step="0.01" name="height" placeholder="Height (cm)" />
          <select name="gender">
            <option value="prefer-not-to-say">Prefer not to say</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="non-binary">Non-binary</option>
          </select>
        </div>
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required minlength="6" />
        <button type="submit" id="authSubmit">Login</button>
      </form>
      <p id="authMessage" class="message"></p>
    </div>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
