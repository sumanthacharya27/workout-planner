<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracking - GymPlanner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .progress-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            font-weight: 800;
        }
        
        .btn-add-progress {
            padding: 1rem 2rem;
            background: var(--gradient-1);
            color: var(--light);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .progress-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .chart-container {
            background: var(--light);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
        }
        
        .progress-item {
            background: var(--gray-100);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
        }
        
        .progress-date {
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }
        
        .progress-data {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .progress-data span {
            background: var(--light);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .progress-notes {
            font-style: italic;
            color: var(--gray-700);
            margin-top: 0.5rem;
        }
        
        .btn-delete-sm {
            background: var(--danger);
            color: var(--light);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .modal {
            margin-top : 10%;
            display: none;
            position: absolute;
            top: o;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--light);
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--dark);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.9rem;
            border: 3px solid var(--gray-300);
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        @media (max-width: 768px) {
            .progress-grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">💪 GymPlanner</div>
            <div class="nav-user">
                <a href="dashboard.html" style="color: var(--dark); text-decoration: none; margin-right: 1rem;">← Dashboard</a>
                <span id="userName">Loading...</span>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="progress-container">
        <div class="page-header">
            <h1>Progress Tracking</h1>
            <button class="btn-add-progress" onclick="openAddModal()">+ Add Entry</button>
        </div>
        
        <div class="progress-grid">
            <div class="chart-container">
                <h3>Weight Progress</h3>
                <canvas id="weightChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Latest Stats</h3>
                <div id="latestStats">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>Progress History</h3>
            <div id="progressList">
                <p class="empty-state">Loading...</p>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2>Add Progress Entry</h2>
            <form id="addProgressForm">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="progressDate" required>
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" step="0.1" id="progressWeight" placeholder="70.5">
                </div>
                <h4>Measurements (cm)</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label>Chest</label>
                        <input type="number" step="0.1" id="progressChest">
                    </div>
                    <div class="form-group">
                        <label>Waist</label>
                        <input type="number" step="0.1" id="progressWaist">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Hips</label>
                        <input type="number" step="0.1" id="progressHips">
                    </div>
                    <div class="form-group">
                        <label>Thighs</label>
                        <input type="number" step="0.1" id="progressThighs">
                    </div>
                </div>
                <div class="form-group">
                    <label>Biceps</label>
                    <input type="number" step="0.1" id="progressBiceps">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="progressNotes" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="button" class="btn-cancel" onclick="closeAddModal()" style="flex: 1; padding: 1rem; border: none; border-radius: 10px; cursor: pointer;">Cancel</button>
                    <button type="submit" class="btn-save" style="flex: 1; padding: 1rem; border: none; border-radius: 10px; background: var(--gradient-1); color: white; cursor: pointer; font-weight: 700;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/progress.js"></script>
    <script>
        (async function() {
            const isLoggedIn = await checkAuth();
            if (!isLoggedIn) {
                window.location.href = 'index.html';
                return;
            }
            
            const sessionData = await fetch(ENDPOINTS.CHECK_SESSION).then(r => r.json());
            if (sessionData.success) {
                document.getElementById('userName').textContent = sessionData.data.full_name;
            }
            
            // Set today's date
            document.getElementById('progressDate').valueAsDate = new Date();
            
            // Load data
            loadAllProgress();
            createWeightChart();
            loadLatestStats();
        })();
        
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch(ENDPOINTS.LOGOUT, { method: 'POST' });
            window.location.href = 'index.html';
        });
        
        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }
        
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        
        document.getElementById('addProgressForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                tracking_date: document.getElementById('progressDate').value,
                weight: document.getElementById('progressWeight').value,
                chest: document.getElementById('progressChest').value,
                waist: document.getElementById('progressWaist').value,
                hips: document.getElementById('progressHips').value,
                thighs: document.getElementById('progressThighs').value,
                biceps: document.getElementById('progressBiceps').value,
                notes: document.getElementById('progressNotes').value
            };
            
            const result = await addProgress(data);
            if (result.success) {
                alert('Progress saved!');
                closeAddModal();
                loadAllProgress();
                createWeightChart();
                loadLatestStats();
            } else {
                alert(result.message);
            }
        });
        
        async function loadLatestStats() {
            const result = await getLatestWeight();
            const container = document.getElementById('latestStats');
            
            if (result.success) {
                container.innerHTML = `
                    <p style="font-size: 2rem; font-weight: 700; color: var(--primary);">${result.data.weight} kg</p>
                    <p style="color: var(--gray-700);">Last updated: ${formatDate(result.data.tracking_date)}</p>
                `;
            } else {
                container.innerHTML = '<p>No weight data yet</p>';
            }
        }
    </script>
</body>
</html>
