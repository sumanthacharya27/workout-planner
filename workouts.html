<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workouts - GymPlanner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .workouts-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            font-weight: 800;
        }
        
        .btn-create {
            padding: 1rem 2rem;
            background: var(--gradient-1);
            color: var(--light);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        #workoutsList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }
        
        .workout-card {
            background: var(--light);
            border: 3px solid var(--gray-200);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s ease;
        }
        
        .workout-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        
        .workout-header h3 {
            color: var(--dark);
            font-size: 1.3rem;
        }
        
        .badge {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .badge-beginner {
            background: linear-gradient(135deg, #06D6A0 0%, #1B98E0 100%);
            color: var(--light);
        }
        
        .badge-intermediate {
            background: linear-gradient(135deg, #F7931E 0%, #FFD23F 100%);
            color: var(--dark);
        }
        
        .badge-advanced {
            background: linear-gradient(135deg, #EF476F 0%, #FF6B35 100%);
            color: var(--light);
        }
        
        .workout-description {
            color: var(--gray-700);
            margin-bottom: 1rem;
        }
        
        .workout-info {
            color: var(--gray-700);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .workout-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-sm {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: var(--gradient-1);
            color: var(--light);
        }
        
        .btn-danger {
            background: var(--danger);
            color: var(--light);
        }
        
        .btn-sm:hover {
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            color: var(--gray-700);
            padding: 4rem 2rem;
            background: var(--light);
            border-radius: 20px;
            font-size: 1.1rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--light);
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .modal-header h2 {
            color: var(--dark);
            font-size: 1.8rem;
        }
        
        .btn-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--gray-700);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--dark);
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem;
            border: 3px solid var(--gray-300);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .exercise-item {
            background: var(--gray-100);
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .exercise-name {
            font-weight: 700;
            color: var(--dark);
        }
        
        .exercise-details {
            font-size: 0.9rem;
            color: var(--gray-700);
        }
        
        .btn-delete {
            background: var(--danger);
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .btn-add {
            background: var(--gradient-2);
            color: var(--light);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        
        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-cancel {
            background: var(--gray-300);
            color: var(--gray-700);
        }
        
        .btn-save {
            background: var(--gradient-1);
            color: var(--light);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">💪 GymPlanner</div>
            <div class="nav-user">
                <a href="dashboard.html" style="color: var(--dark); text-decoration: none; margin-right: 1rem;">← Dashboard</a>
                <span id="userName">Loading...</span>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="workouts-container">
        <div class="page-header">
            <h1>My Workouts</h1>
            <button class="btn-create" onclick="openCreateModal()">+ Create Workout</button>
        </div>
        
        <div id="workoutsList">
            <p class="empty-state">Loading workouts...</p>
        </div>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Workout</h2>
                <button class="btn-close" onclick="closeCreateModal()">&times;</button>
            </div>
            
            <form id="createWorkoutForm">
                <div class="form-group">
                    <label>Workout Name</label>
                    <input type="text" id="workoutName" required placeholder="e.g., My Leg Day">
                </div>
                
                <div class="form-group">
                    <label>Difficulty</label>
                    <select id="workoutDifficulty" required>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="workoutDescription" rows="3" placeholder="Optional description..."></textarea>
                </div>
                
                <hr style="margin: 2rem 0; border: 1px solid var(--gray-300);">
                
                <h3 style="margin-bottom: 1rem;">Exercises</h3>
                
                <button type="button" class="btn-add" onclick="openAddExercise()">+ Add Exercise</button>
                
                <div id="exercisesList">
                    <p class="empty-state">No exercises added yet.</p>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeCreateModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Workout</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addExerciseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Exercise</h2>
                <button class="btn-close" onclick="closeAddExercise()">&times;</button>
            </div>
            
            <form id="addExerciseForm">
                <div class="form-group">
                    <label>Exercise Name</label>
                    <input type="text" id="exerciseName" required placeholder="e.g., Squats">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Sets</label>
                        <input type="number" id="exerciseSets" required min="1" value="3">
                    </div>
                    <div class="form-group">
                        <label>Reps</label>
                        <input type="number" id="exerciseReps" required min="1" value="10">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="exerciseWeight" min="0" step="0.5" value="0">
                    </div>
                    <div class="form-group">
                        <label>Rest (seconds)</label>
                        <input type="number" id="exerciseRest" min="0" value="60">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Notes (Optional)</label>
                    <textarea id="exerciseNotes" rows="2" placeholder="Any notes..."></textarea>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeAddExercise()">Cancel</button>
                    <button type="submit" class="btn-save">Add Exercise</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/workouts.js"></script>
    <script>
        (async function() {
            const isLoggedIn = await checkAuth();
            if (!isLoggedIn) {
                window.location.href = 'index.html';
                return;
            }
            
            const sessionData = await fetch(ENDPOINTS.CHECK_SESSION).then(r => r.json());
            if (sessionData.success) {
                document.getElementById('userName').textContent = sessionData.data.full_name;
            }
            
            loadAllWorkouts();
        })();
        
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch(ENDPOINTS.LOGOUT, { method: 'POST' });
            window.location.href = 'index.html';
        });
        
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
            currentExercises = [];
            renderExercises();
        }
        
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            document.getElementById('createWorkoutForm').reset();
            currentExercises = [];
        }
        
        function openAddExercise() {
            document.getElementById('addExerciseModal').classList.add('active');
        }
        
        function closeAddExercise() {
            document.getElementById('addExerciseModal').classList.remove('active');
            document.getElementById('addExerciseForm').reset();
        }
        
        document.getElementById('addExerciseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const exercise = {
                name: document.getElementById('exerciseName').value,
                sets: parseInt(document.getElementById('exerciseSets').value),
                reps: parseInt(document.getElementById('exerciseReps').value),
                weight: parseFloat(document.getElementById('exerciseWeight').value),
                rest: parseInt(document.getElementById('exerciseRest').value),
                notes: document.getElementById('exerciseNotes').value
            };
            
            addExercise(exercise);
            closeAddExercise();
        });
        
        document.getElementById('createWorkoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (currentExercises.length === 0) {
                alert('Please add at least one exercise!');
                return;
            }
            
            const workoutData = {
                name: document.getElementById('workoutName').value,
                difficulty: document.getElementById('workoutDifficulty').value,
                description: document.getElementById('workoutDescription').value,
                exercises: currentExercises
            };
            
            const result = await createWorkout(workoutData);
            
            if (result.success) {
                alert('Workout created successfully!');
                closeCreateModal();
                loadAllWorkouts();
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
